name: Update Changelog

on:
  repository_dispatch:
    types: [accuratkey-push, trivquic-push]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Update changelog entry
        env:
          APP: ${{ github.event.client_payload.app }}
          COMMIT_MSG: ${{ github.event.client_payload.message }}
          COMMIT_BODY: ${{ github.event.client_payload.body }}
          COMMIT_SHA: ${{ github.event.client_payload.sha }}
        run: |
          node << 'JS'
          const fs = require('fs');
          const app = process.env.APP || 'Unknown';
          const sha = (process.env.COMMIT_SHA || '').slice(0, 7);
          const date = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
          const tag = app === 'AccuratKey' ? 'accuratkey' : 'trivquic';
          const color = app === 'AccuratKey' ? '#7c6af7' : '#f59e0b';

          // Prefer a "changelog: ..." line from the commit body (plain-English,
          // written for end users) over the raw technical commit subject.
          // Falls back to the subject line if no changelog: line was written.
          const body = process.env.COMMIT_BODY || '';
          const subject = (process.env.COMMIT_MSG || '').replace(/"/g, "'");
          const clMatch = body.match(/changelog:\s*(.+)/i);
          const msg = (clMatch ? clMatch[1].trim() : subject).replace(/"/g, "'");

          const newEntry = `  { app:"${app}", tag:"${tag}", color:"${color}", date:"${date}", items:["${msg}"] },\n`;

          let content = fs.readFileSync('app/page.js', 'utf8');
          content = content.replace('const CHANGELOG = [\n', `const CHANGELOG = [\n${newEntry}`);

          // Keep only 10 entries
          const m = content.match(/const CHANGELOG = \[([\s\S]*?)\];/);
          if (m) {
            const entries = m[1].split(/(?<=\}),\n  (?=\{)/).filter(e => e.trim());
            if (entries.length > 10) {
              const trimmed = entries.slice(0, 10).join(',\n  ');
              content = content.replace(/const CHANGELOG = \[[\s\S]*?\];/, `const CHANGELOG = [\n  ${trimmed}\n];`);
            }
          }
          fs.writeFileSync('app/page.js', content);
          console.log(`Updated: ${app} — ${msg}`);
          JS
      - name: Commit and push
        run: |
          git config user.email "changelog-bot@chrisprojects"
          git config user.name "Changelog Bot"
          git add app/page.js
          git diff --staged --quiet || git commit -m "changelog: ${{ github.event.client_payload.app }} — ${{ github.event.client_payload.message }}"
          git push
