name: Update Changelog

on:
  repository_dispatch:
    types: [accuratkey-push, trivquic-push]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Update changelog entry
        env:
          APP: ${{ github.event.client_payload.app }}
          COMMIT_MSG: ${{ github.event.client_payload.message }}
          COMMIT_BODY: ${{ github.event.client_payload.body }}
          COMMIT_SHA: ${{ github.event.client_payload.sha }}
        run: |
          node << 'JS'
          const fs = require('fs');
          const app = process.env.APP || 'Unknown';
          const sha = (process.env.COMMIT_SHA || '').slice(0, 7);
          const date = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
          const tag = app === 'AccuratKey' ? 'accuratkey' : 'trivquic';
          const color = app === 'AccuratKey' ? '#7c6af7' : '#f59e0b';

          // The changelog: line is already written in proper customer-facing
          // language by the committer - trust it directly rather than trying
          // to rewrite it, which was mangling perfectly good entries.
          const body = process.env.COMMIT_BODY || '';
          const subject = (process.env.COMMIT_MSG || '').replace(/"/g, "'");
          const clMatch = body.match(/changelog:\s*(.+)/i);
          let msg = (clMatch ? clMatch[1].trim() : subject).replace(/"/g, "'").replace(/'/g, "'");

          // Only apply minimal normalization - capitalize first letter,
          // ensure it doesn't start with a raw verb like "Fix" (imperative)
          // vs "Fixed" (past tense). Don't cut at sentence boundaries since
          // changelog lines often don't have terminal punctuation.
          msg = msg
            .replace(/^Fix\b\s*/i, 'Fixed ')
            .replace(/^Add\b\s*/i, 'Added ')
            .replace(/^Remove\b\s*/i, 'Removed ')
            .replace(/^Update\b\s*/i, 'Updated ')
            .replace(/^Build\b\s*/i, 'Added ')
            .replace(/^Make\b\s*/i, 'Improved ')
            .replace(/^Rebuild\b\s*/i, 'Improved ')
            .replace(/^Restore\b\s*/i, 'Restored ');

          // Hard cap at 160 chars on a word boundary - generous enough that
          // a well-written changelog line never hits it, but prevents runaway
          // entries if someone forgets to write a changelog: line and the raw
          // commit subject is very long.
          if (msg.length > 160) {
            msg = msg.slice(0, 160).replace(/\s+\S*$/, '') + '…';
          }

          const newEntry = `  { app:"${app}", tag:"${tag}", color:"${color}", date:"${date}", items:["${msg}"] },\n`;

          let content = fs.readFileSync('app/page.js', 'utf8');
          content = content.replace('const CHANGELOG = [\n', `const CHANGELOG = [\n${newEntry}`);

          // Keep only 15 entries (increased from 10 since we now have show/hide)
          const m = content.match(/const CHANGELOG = \[([\s\S]*?)\];/);
          if (m) {
            const entries = m[1].split(/(?<=\}),\n  (?=\{)/).filter(e => e.trim());
            if (entries.length > 15) {
              const trimmed = entries.slice(0, 15).join(',\n  ');
              content = content.replace(/const CHANGELOG = \[[\s\S]*?\];/, `const CHANGELOG = [\n  ${trimmed}\n];`);
            }
          }
          fs.writeFileSync('app/page.js', content);
          console.log(`Updated: ${app} — ${msg}`);

          JS
      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add app/page.js
          git diff --staged --quiet || git commit -m "changelog: ${{ github.event.client_payload.app }} — ${{ github.event.client_payload.message }}"
          git push
